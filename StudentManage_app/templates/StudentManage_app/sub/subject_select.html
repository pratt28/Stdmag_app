{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-6">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Select Subject</h2>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="block text-sm font-medium text-gray-700 mb-1">Choose Subject:</label>
                {{ form.subject }}
            </div>
            
            <div class="flex gap-4 pt-4">
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-md hover:bg-indigo-700 transition">
                    View Subject
                </button>
                <a href="{% url 'subject_list' %}" class="bg-gray-300 text-gray-700 px-6 py-2 rounded-md hover:bg-gray-400 transition">
                    Cancel
                </a>
            </div>
        </form>
        
        <!-- Optional: Show all subjects as a table -->
        <div class="mt-8">
            <h3 class="text-lg font-semibold mb-4">All Subjects</h3>
            <table class="min-w-full divide-y divide-gray-200">
                <thead>
                    <tr>
                        <th class="px-4 py-2 text-left">Code</th>
                        <th class="px-4 py-2 text-left">Name</th>
                        <th class="px-4 py-2 text-left">Department</th>
                    </tr>
                </thead>
                <tbody>
                    {% for subject in subjects %}
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-2">{{ subject.subject_code }}</td>
                        <td class="px-4 py-2">
                            <a href="{% url 'subject_detail' subject.id %}" class="text-indigo-600 hover:underline">
                                {{ subject.subject_name }}
                            </a>
                        </td>
                        <td class="px-4 py-2">{{ subject.department.name }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
