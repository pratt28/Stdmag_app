{% extends 'base.html' %}

{% block content %}

<div class="card p-4">

    <h2>Edit Teacher</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control" value="{{ teacher.name }}">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" value="{{ teacher.email }}">
        </div>

        <div class="mb-3">
            <label>Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ teacher.phone }}">
        </div>

        <button type="submit" class="btn btn-success">Update</button>
        <a href="{% url 'teacher_list' %}" class="btn btn-secondary">Cancel</a>

    </form>

</div>

{% endblock %}
