{% extends 'base.html' %}

{% block content %}

<div class="card p-4">

<h2>Attendance</h2>

<table class="table table-striped">

<thead>
<tr>
<th>Student</th>
<th>Date</th>
<th>Status</th>
</tr>
</thead>

<tbody>

{% for item in attendance %}

<tr>
<td>{{ item.student }}</td>
<td>{{ item.date }}</td>
<td>{{ item.status }}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
