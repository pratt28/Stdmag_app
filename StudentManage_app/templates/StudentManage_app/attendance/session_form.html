{% extends 'StudentManage_app/attendance/base.html' %}

{% block title %}Create Session - Attendance System{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Create Attendance Session</h1>
    <p>Set up a new class session for attendance tracking</p>
</div>

<div class="card" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="subject">📚 Subject *</label>
            <select name="subject" id="subject" class="form-control" required>
                <option value="">Select Subject</option>
                {% for subject in subjects %}
                <option value="{{ subject.id }}">{{ subject.subject_name }} ({{ subject.department.name }} - {{ subject.year }})</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="date">📅 Date *</label>
            <input type="date" name="date" id="date" class="form-control" required 
                   value="{% now "Y-m-d" %}">
        </div>
        
        <div class="form-group">
            <label for="period">🕐 Period *</label>
            <input type="text" name="period" id="period" class="form-control" required
                   placeholder="e.g., Period 1, Morning Session, etc.">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label for="start_time">⏰ Start Time</label>
                <input type="time" name="start_time" id="start_time" class="form-control" value="09:00">
            </div>
            <div class="form-group">
                <label for="end_time">⏰ End Time</label>
                <input type="time" name="end_time" id="end_time" class="form-control" value="10:00">
            </div>
        </div>
        
        <div style="display: flex; gap: 15px; margin-top: 10px;">
            <button type="submit" class="btn btn-primary">✅ Create Session</button>
            <a href="{% url 'session_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
