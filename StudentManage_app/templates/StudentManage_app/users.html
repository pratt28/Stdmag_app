{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Users</h2>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Staff</th>
                        <th>Date Joined</th>
                    </tr>
                </thead>

                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user.id }}</td>
                        <td>{{ user.username }}</td>
                        <td>{{ user.email }}</td>
                        <td>
                            {% if user.is_staff %}
                                Yes
                            {% else %}
                                No
                            {% endif %}
                        </td>
                        <td>{{ user.date_joined }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="5">No users found</td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

{% endblock %}
