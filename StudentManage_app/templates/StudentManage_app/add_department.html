{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <div class="card shadow p-4">

        <h2>Add Department</h2>

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                Save Department
            </button>

            <a href="{% url 'department_list' %}"
               class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>
</div>

{% endblock %}
