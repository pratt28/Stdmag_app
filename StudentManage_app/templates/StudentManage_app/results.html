{% extends 'base.html' %}

{% block content %}

<div class="card p-4">

<h2>Results</h2>

<table class="table table-striped">

<thead>
<tr>
<th>Student</th>
<th>Subject</th>
<th>Marks</th>
<th>Grade</th>
</tr>
</thead>

<tbody>

{% for result in results %}

<tr>
<td>{{ result.student }}</td>
<td>{{ result.subject }}</td>
<td>{{ result.marks }}</td>
<td>{{ result.grade }}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
