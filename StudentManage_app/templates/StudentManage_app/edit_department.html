{% extends 'base.html' %}

{% block title %}
Edit Department
{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow-lg border-0">

                <div class="card-header bg-warning text-dark">
                    <h2 class="mb-0">
                        Edit Department
                    </h2>
                </div>

                <div class="card-body">

                    <form method="POST">
                        {% csrf_token %}

                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    {{ field.label }}
                                </label>
                                {{ field }}

                                {% if field.errors %}
                                    <div class="text-danger mt-1">
                                        {{ field.errors }}
                                    </div>
                                {% endif %}
                            </div>
                        {% endfor %}

                        <div class="d-flex justify-content-between">

                            <a href="{% url 'department_list' %}"
                               class="btn btn-secondary">
                                Back
                            </a>

                            <button type="submit"
                                    class="btn btn-warning">
                                Update Department
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}
