<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="/static/css/style.css?v=5">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <h3>SMS</h3>

        </div>

        <ul>

<li>
<a href="{% url 'dashboard' %}">
<i class="fas fa-chart-line"></i>
Dashboard
</a>
</li>

<li>
<a href="{% url 'student_list' %}">
<i class="fas fa-user-graduate"></i>
Students
</a>
</li>

<li>
<a href="{% url 'department_list' %}">
<i class="fas fa-building"></i>
Departments
</a>
</li>

<li>
<a href="{% url 'subject_list' %}">
<i class="fas fa-book"></i>
Subjects
</a>
</li> 

<li>
<a href="{% url 'teacher_list' %}">
<i class="fas fa-chalkboard-teacher"></i>
Teachers
</a>
</li>

<li>
<a href="{% url 'attendance_list' %}">
<i class="fas fa-calendar-check"></i>
Attendance
</a>
</li>

<li>
<a href="{% url 'result_list' %}">
<i class="fas fa-file-alt"></i>
Results
</a>
</li>

<li>
<a href="{% url 'fee_list' %}">
<i class="fas fa-money-bill-wave"></i>
Fees
</a>
</li>

<li>
<a href="{% url 'user_list' %}">
<i class="fas fa-users"></i>
Users
</a>
</li>

<li>
<a href="{% url 'profile' %}">
<i class="fas fa-user-circle"></i>
Profile
</a>
</li>

</ul>
</aside>
    <!-- Main Content -->

    <main class="content">

        <div class="topbar">

            <h4>Student Management Dashboard</h4>

        </div>

        {% block content %}

        {% endblock %}

    </main>

</div>

</body>

</html>
